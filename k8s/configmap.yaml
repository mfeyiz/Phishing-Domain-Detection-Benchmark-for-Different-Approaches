apiVersion: v1
kind: ConfigMap
metadata:
  name: phishing-detector-config
  labels:
    app: phishing-detector
data:
  MODEL_DIR: "/app/models"
  DEFAULT_THRESHOLD: "0.5"
  LOG_LEVEL: "INFO"
  ENABLE_ALGORITHMIC: "true"
  ENABLE_RF: "true"
  ENABLE_XGB: "true"
  ENABLE_URLBERT: "true"
  ENABLE_SBERT_CANINE: "false"
  ENABLE_CROSSENCODER_CANINE: "false"
  DATABASE_URL: "postgresql://admin:admin123@postgres:5432/phishing_db"
